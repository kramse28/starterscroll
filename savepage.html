<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1">
        <title>Saved Character</title>
        <link rel="stylesheet" href="assets/css/savepage.css">
    </head>
    <body>
        <main id="save-page-main" class="save-page">
            <img
                id="save-page-bg"
                class="save-page-bg"
                alt=""
                aria-hidden="true"
                decoding="sync"
            >
            <a class="saved-back" href="createhub.html" aria-label="Back to create hub"><span>Back</span></a>
            <a class="saved-create" href="createvisual.html" aria-label="Create a new character"><span>Create</span></a>

            <div class="saved-name-box">
                <label class="visually-hidden" for="saved-character-name">Character name</label>
                <input
                    type="text"
                    id="saved-character-name"
                    name="saved-character-name"
                    maxlength="40"
                    autocomplete="off"
                    spellcheck="false"
                    placeholder="Character name"
                    aria-label="Character name"
                >
            </div>

            <div class="saved-avatar-wrap" aria-hidden="true">
                <img id="saved-avatar-image" class="saved-avatar-image" alt="">
            </div>
        </main>
        <script src="assets/js/savepage.js"></script>
    </body>
</html>
